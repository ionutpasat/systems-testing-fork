name: doxygen-docs

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Generate Doxygen documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Generate Doxygen config and run
        shell: bash
        run: |
          # generate a default Doxyfile and run doxygen
          doxygen -g Doxyfile
          doxygen Doxyfile

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-docs
          path: html
